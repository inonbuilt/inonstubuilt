    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #0f172a;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
    scroll-behavior: smooth;
}

/* HEADER */
.fixed-header {
    position: sticky;
    top: 0;
    padding-top: 60px;
    padding-bottom: 20px;
    text-align: center;
    background: linear-gradient(to bottom, #0f172a 80%, transparent);
    z-index: 1000;
}

.fixed-header h1 {
    font-size: 2.6rem;
    font-weight: 900;
    letter-spacing: 6px;
}

.fixed-header h2 {
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: #3b82f6;
    margin-top: 8px;
}

/* STACK LAYOUT */
.scene-wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    padding-top: 30px;
    padding-bottom: 120px;
    perspective: 1000px;
}

.carousel {
    width: 100%;
    max-width: 360px; /* smaller */
    display: flex;
    flex-direction: column;
    gap: 30px;
    transform-style: preserve-3d;
}

/* CARD STYLE (SMALLER) */
.card {
    width: 100%;
    height: 150px; /* reduced */
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    color: white;
    transition: 
        transform 0.4s ease,
        opacity 0.6s ease,
        box-shadow 0.4s ease,
        filter 0.4s ease;
    opacity: 0;
    transform: translateY(50px);
}

/* Reveal animation */
.card.visible {
    opacity: 1;
    transform: translateY(0px);
}

/* Hover */
.card:hover {
    border-color: #3b82f6;
    box-shadow: 0 0 25px rgba(59,130,246,0.5);
    transform: scale(1.04);
}

/* Slight bend illusion */
.card.bend {
    transform: translateY(var(--offset)) scale(0.97);
    filter: brightness(0.85);
}

/* Labels */
.set-label {
    font-size: 2.8rem;
    font-weight: 900;
}

.exam-label {
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: #94a3b8;
}

/* Dropdown */
.set-dropdown {
    margin-top: 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 0.65rem;
    width: 85%;
}

/* Progress Bar */
.scroll-indicator {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    overflow: hidden;
}

.scroll-progress {
    height: 100%;
    width: 0%;
    background: #3b82f6;
    transition: width 0.2s ease;
}

</style>

<script>
const cards = document.querySelectorAll(".card");
const progressBar = document.getElementById("scrollProgress");

/* Reveal animation on scroll */
function revealCards() {
    const trigger = window.innerHeight * 0.85;

    cards.forEach(card => {
        const top = card.getBoundingClientRect().top;
        if (top < trigger) {
            card.classList.add("visible");
        }
    });
}

/* Scroll progress */
function updateProgress() {
    const scrollTop = window.pageYOffset;
    const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    const percent = (scrollTop / maxScroll) * 100;
    progressBar.style.width = percent + "%";
}

window.addEventListener("scroll", () => {
    revealCards();
    updateProgress();
});

/* Initial check */
revealCards();
updateProgress();
</script>
