    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0f172a; 
            color: white;
            /* This height is CRITICAL for scrolling to work */
            height: 500vh;
        }

        /* FIXED TITLES */
        .fixed-header {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 1000;
            width: 100%;
            pointer-events: none;
        }

        .fixed-header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 12px;
            margin: 0;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .fixed-header h2 {
            font-size: 0.9rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #3b82f6;
            margin-top: 10px;
        }

        /* 3D SCENE */
        .scene-wrapper {
            position: fixed; /* Keeps the "camera" still while we scroll the body */
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
        }

        .carousel {
            position: relative;
            width: 160px;
            height: 220px;
            transform-style: preserve-3d;
            /* Transition set to 0.1s for a responsive, "heavy" feel */
            transition: transform 0.1s linear;
        }

        .card {
            position: absolute;
            width: 160px;
            height: 220px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            backface-visibility: visible; 
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Circular Positioning */
        .card:nth-child(1) { transform: rotateY(0deg) translateZ(350px); }
        .card:nth-child(2) { transform: rotateY(90deg) translateZ(350px); }
        .card:nth-child(3) { transform: rotateY(180deg) translateZ(350px); }
        .card:nth-child(4) { transform: rotateY(270deg) translateZ(350px); }

        .card:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.5);
            z-index: 50;
        }

        .set-label { font-size: 4rem; font-weight: 900; }
        .exam-label { font-size: 0.6rem; letter-spacing: 2px; color: #94a3b8; font-weight: bold; }

        .set-dropdown {
    margin-top: 15px;

    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.7rem;
    width: 85%;
    outline: none;
    cursor: pointer;
    backdrop-filter: blur(10px);
}

.set-dropdown option {
    background: #1e293b; /* Dark background for the list items */

}

/* Ensure the dropdown card doesn't flip away too fast when interacting */
.dropdown-card:focus-within {
    border-color: #3b82f6;
    background: rgba(59, 130, 246, 0.2);
}

    <script>

const carousel = document.getElementById('carousel');
let currentRotation = 0;

/* =========================
   DESKTOP - SCROLL ROTATION
========================= */

window.addEventListener('scroll', () => {

    if (window.innerWidth <= 1024) return;

    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    const maxScroll = document.documentElement.scrollHeight - window.innerHeight;

    const scrollFraction = scrollTop / maxScroll;
    currentRotation = scrollFraction * 360;

    carousel.style.transform = `rotateY(${-currentRotation}deg)`;

}, { passive: true });



/* =========================
   MOBILE - SWIPE ROTATION
========================= */

let startX = 0;
let isDragging = false;

carousel.addEventListener('touchstart', (e) => {
    if (window.innerWidth > 1024) return;

    startX = e.touches[0].clientX;
    isDragging = true;
});

carousel.addEventListener('touchmove', (e) => {
    if (!isDragging || window.innerWidth > 1024) return;

    const currentX = e.touches[0].clientX;
    const diff = currentX - startX;

    // rotate only if horizontal movement is strong
    if (Math.abs(diff) > 5) {
        currentRotation += diff * 0.4;
        carousel.style.transform = `rotateY(${currentRotation}deg)`;
        startX = currentX;
    }

}, { passive: true });

carousel.addEventListener('touchend', () => {
    isDragging = false;
});

</script>
